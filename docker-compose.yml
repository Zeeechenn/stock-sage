services:
  backend:
    build:
      context: .
      target: backend
    volumes:
      - ./mingcang.db:/app/mingcang.db
      - ~/.mingcang:/root/.mingcang
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
