<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">MingCang system architecture</title>
  <desc id="desc">明仓 MingCang architecture diagram showing local data sources, SQLite storage, research engine, memory and audit layer, agent interfaces, user surfaces, audit-only quant evidence, read-only HK/US research, and safety gates.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .lane { fill: #ffffff; stroke: #d8e0ea; stroke-width: 1.2; }
      .laneTitle { font: 800 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .label { font: 720 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .small { font: 500 12.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .card { fill: #f8fafc; stroke: #dbe4ef; stroke-width: 1; }
      .accent1 { fill: #ecfeff; stroke: #22d3ee; }
      .accent2 { fill: #f0fdf4; stroke: #4ade80; }
      .accent3 { fill: #fff7ed; stroke: #fb923c; }
      .accent4 { fill: #eef2ff; stroke: #818cf8; }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .safe { stroke: #0f766e; stroke-width: 2.4; fill: none; marker-end: url(#arrowSafe); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowSafe" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="920"/>
  <text class="title" x="72" y="82">MingCang System Architecture</text>
  <text class="subtitle" x="72" y="116">Position Lens: local data, auditable evidence, agent workflows, and explicit safety gates</text>

  <rect class="lane" x="64" y="158" width="198" height="610" rx="8"/>
  <text class="laneTitle" x="88" y="196">Data Sources</text>
  <rect class="card accent1" x="88" y="226" width="150" height="70" rx="8"/>
  <text class="label" x="108" y="254">Market Data</text>
  <text class="small" x="108" y="278">Eastmoney / AkShare</text>
  <rect class="card accent2" x="88" y="326" width="150" height="70" rx="8"/>
  <text class="label" x="108" y="354">Fundamentals</text>
  <text class="small" x="108" y="378">Financials / QFII</text>
  <rect class="card accent3" x="88" y="426" width="150" height="70" rx="8"/>
  <text class="label" x="108" y="454">News</text>
  <text class="small" x="108" y="478">iFinD / Tavily</text>
  <rect class="card accent4" x="88" y="526" width="150" height="70" rx="8"/>
  <text class="label" x="108" y="554">User Input</text>
  <text class="small" x="108" y="578">Watchlist / Positions</text>

  <rect class="lane" x="312" y="158" width="210" height="610" rx="8"/>
  <text class="laneTitle" x="336" y="196">Local Store</text>
  <rect class="card accent2" x="336" y="236" width="162" height="86" rx="8"/>
  <text class="label" x="358" y="266">mingcang.db</text>
  <text class="small" x="358" y="290">Prices / news / signals</text>
  <rect class="card" x="336" y="360" width="162" height="80" rx="8"/>
  <text class="label" x="358" y="390">Quality Gates</text>
  <text class="small" x="358" y="414">as_of / adjusted prices</text>
  <rect class="card" x="336" y="478" width="162" height="80" rx="8"/>
  <text class="label" x="358" y="508">Audit Trail</text>
  <text class="small" x="358" y="532">FTS logs / reviews</text>

  <rect class="lane" x="572" y="158" width="238" height="610" rx="8"/>
  <text class="laneTitle" x="596" y="196">Research Engine</text>
  <rect class="card accent1" x="596" y="228" width="190" height="74" rx="8"/>
  <text class="label" x="618" y="258">Technical Layer</text>
  <text class="small" x="618" y="282">Signals and indicators</text>
  <rect class="card accent3" x="596" y="330" width="190" height="74" rx="8"/>
  <text class="label" x="618" y="360">Sentiment Layer</text>
  <text class="small" x="618" y="384">News and events</text>
  <rect class="card accent4" x="596" y="432" width="190" height="74" rx="8"/>
  <text class="label" x="618" y="462">Evidence Gates</text>
  <text class="small" x="618" y="486">Quant / Kronos audit-only</text>
  <rect class="card" x="596" y="534" width="190" height="74" rx="8"/>
  <text class="label" x="618" y="564">Risk Boundaries</text>
  <text class="small" x="618" y="588">A-share prod / HK-US read-only</text>

  <rect class="lane" x="860" y="158" width="218" height="610" rx="8"/>
  <text class="laneTitle" x="884" y="196">Memory</text>
  <rect class="card accent2" x="884" y="236" width="170" height="78" rx="8"/>
  <text class="label" x="904" y="266">~/.mingcang</text>
  <text class="small" x="904" y="290">Rules and notes</text>
  <rect class="card" x="884" y="352" width="170" height="78" rx="8"/>
  <text class="label" x="904" y="382">Layered Memory</text>
  <text class="small" x="904" y="406">Atoms / scenarios</text>
  <rect class="card" x="884" y="468" width="170" height="78" rx="8"/>
  <text class="label" x="904" y="498">Review Memory</text>
  <text class="small" x="904" y="522">Evidence over time</text>

  <rect class="lane" x="1128" y="158" width="248" height="610" rx="8"/>
  <text class="laneTitle" x="1152" y="196">Interfaces</text>
  <rect class="card accent4" x="1152" y="228" width="200" height="74" rx="8"/>
  <text class="label" x="1174" y="258">CLI / Pi</text>
  <text class="small" x="1174" y="282">mingcang commands</text>
  <rect class="card accent1" x="1152" y="330" width="200" height="74" rx="8"/>
  <text class="label" x="1174" y="360">MCP Tools</text>
  <text class="small" x="1174" y="384">mingcang_* context</text>
  <rect class="card accent2" x="1152" y="432" width="200" height="74" rx="8"/>
  <text class="label" x="1174" y="462">Web Console</text>
  <text class="small" x="1174" y="486">Research cockpit</text>
  <rect class="card" x="1152" y="534" width="200" height="74" rx="8"/>
  <text class="label" x="1174" y="564">Exports</text>
  <text class="small" x="1174" y="588">Reports / notifications</text>

  <path class="line" d="M262 458 H312"/>
  <path class="line" d="M522 458 H572"/>
  <path class="line" d="M810 458 H860"/>
  <path class="line" d="M1078 458 H1128"/>
  <path class="safe" d="M1252 608 C1252 696 1020 814 704 814 C390 814 194 700 194 610"/>
  <text class="subtitle" x="320" y="852">Safety loop: local-first, dry-run before writes, quant promotion gated, remote writes gated by API key + allowlist</text>
</svg>
