<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="812" viewBox="0 0 1000 812" role="img" aria-labelledby="title desc">
  <title id="title">MingCang research-to-decision loop</title>
  <desc id="desc">MingCang research-to-decision architecture: imported data and human theses flow through ResearchCase, SignalCase, PositionCase, and ReviewCase, with outcome-gated memory feeding the next judgment. The human makes every decision; safety gates wrap the loop.</desc>
  <defs>
    <linearGradient id="coreFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="0.58" stop-color="#f8fffd"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="warmFill" x1="0" x2="1">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f766e" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1 1 L7 4.5 L1 8 Z" fill="#0f766e" opacity="0.55"/>
    </marker>
    <marker id="arrowWarm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1 1 L7 4.5 L1 8 Z" fill="#b7791f" opacity="0.65"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1.2; }
      .hair { stroke: #0d1117; stroke-opacity: 0.08; stroke-width: 1; }
      .trace { fill: none; stroke: #0f766e; stroke-opacity: 0.5; stroke-width: 1.8; stroke-linecap: round; marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #b7791f; stroke-opacity: 0.55; stroke-width: 1.6; stroke-linecap: round; stroke-dasharray: 7 8; marker-end: url(#arrowWarm); }
      .kicker { font: 650 10.5px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #0f766e; letter-spacing: 0.16em; }
      .title { font: 760 36px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0d1117; }
      .subtitle { font: 430 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6b68; }
      .column { font: 700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #72807c; letter-spacing: 0.14em; }
      .caseTitle { font: 750 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0d1117; }
      .label { font: 730 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0d1117; }
      .ask { font: 430 12.5px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6b68; }
      .small { font: 430 11.5px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6b68; }
      .layer { font: 650 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #0f766e; letter-spacing: 0.12em; }
      .layerWarm { font: 650 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #9a6700; letter-spacing: 0.12em; }
      .node { fill: #ffffff; stroke: #d9e2df; stroke-width: 1.05; }
      .caseCard { fill: url(#coreFill); stroke: #9fd8d1; stroke-width: 1.3; }
      .memCard { fill: url(#warmFill); stroke: #e7c873; stroke-width: 1.2; }
      .dashed { fill: #fffdf8; stroke: #c28c2a; stroke-width: 1.1; stroke-dasharray: 7 7; }
      .iconTeal { fill: none; stroke: #0f766e; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
      .iconStroke { fill: none; stroke: #3f4a47; stroke-width: 1.3; stroke-linecap: round; stroke-linejoin: round; }
      .iconWarm { fill: none; stroke: #9a6700; stroke-width: 1.35; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" width="1000" height="812"/>

  <text class="kicker" x="56" y="62">MINGCANG / LOCAL-FIRST RESEARCH OS</text>
  <text class="title" x="56" y="106">Research-to-Decision Loop</text>
  <text class="subtitle" x="58" y="135">进口判断 → 记录证据 → 证伪 → 跟踪 → 复盘归因 → 记忆更新。人做最终决策，AI 做广度、证伪与风险纪律。</text>

  <rect class="frame" x="48" y="168" width="904" height="560" rx="3"/>

  <!-- INPUTS column -->
  <text class="column" x="76" y="206">01 / 进口 · INPUTS</text>
  <line class="hair" x1="76" y1="218" x2="268" y2="218"/>

  <g transform="translate(76 236)">
    <rect class="node" x="0" y="0" width="192" height="58" rx="2"/>
    <g transform="translate(16 14)">
      <ellipse class="iconStroke" cx="11" cy="6" rx="11" ry="5"/>
      <path class="iconStroke" d="M0 6 V25 C0 28 5 31 11 31 C17 31 22 28 22 25 V6"/>
      <path class="iconStroke" d="M0 15 C0 18 5 21 11 21 C17 21 22 18 22 15"/>
    </g>
    <text class="label" x="52" y="25">市场数据</text>
    <text class="small" x="52" y="44">行情 · 财务 · QFII</text>
  </g>
  <g transform="translate(76 304)">
    <rect class="node" x="0" y="0" width="192" height="58" rx="2"/>
    <g transform="translate(16 14)">
      <rect class="iconStroke" x="0" y="0" width="24" height="28" rx="3"/>
      <path class="iconStroke" d="M0 8 H24 M6 17 H18 M6 23 H15"/>
    </g>
    <text class="label" x="52" y="25">新闻情感</text>
    <text class="small" x="52" y="44">事件 · LLM 情绪</text>
  </g>
  <g transform="translate(76 372)">
    <rect class="node" x="0" y="0" width="192" height="58" rx="2"/>
    <g transform="translate(16 16)">
      <rect class="iconStroke" x="3" y="0" width="22" height="18" rx="2"/>
      <path class="iconStroke" d="M0 26 H28 L24 18 H4 Z"/>
    </g>
    <text class="label" x="52" y="25">自选 / 持仓</text>
    <text class="small" x="52" y="44">用户状态</text>
  </g>
  <g transform="translate(76 440)">
    <rect class="dashed" x="0" y="0" width="192" height="58" rx="2"/>
    <g transform="translate(16 15)">
      <circle class="iconWarm" cx="11" cy="8" r="6"/>
      <path class="iconWarm" d="M1 30 C3 21 19 21 21 30"/>
    </g>
    <text class="label" x="52" y="25">进口人类论题</text>
    <text class="small" x="52" y="44">外部研究者 · 机构 · 景气</text>
  </g>
  <g transform="translate(76 514)">
    <rect class="node" x="0" y="0" width="192" height="54" rx="2"/>
    <g transform="translate(16 13)">
      <path class="iconWarm" d="M11 0 L22 5 V14 C22 21 17 26 11 28 C5 26 0 21 0 14 V5 Z"/>
      <path class="iconWarm" d="M6 14 L10 18 L17 9"/>
    </g>
    <text class="label" x="52" y="23">Provider Guard</text>
    <text class="small" x="52" y="42">本地 SQLite · 新鲜度</text>
  </g>

  <!-- four cases flow -->
  <text class="column" x="300" y="206">02 / 研究决策闭环 · CASES</text>
  <line class="hair" x1="300" y1="218" x2="924" y2="218"/>

  <!-- ResearchCase -->
  <g transform="translate(300 236)" filter="url(#soft)">
    <rect class="caseCard" x="0" y="0" width="296" height="132" rx="4"/>
    <text class="layer" x="20" y="28">L1 证据 · L2 论题</text>
    <text class="caseTitle" x="20" y="56">ResearchCase</text>
    <text class="ask" x="20" y="80">为什么这只票 / 主题值得研究？</text>
    <text class="small" x="20" y="104">证据卡 · 论题 · 矛盾点 · 长期/主题研究</text>
    <text class="small" x="20" y="121">个股 dossier · ForwardThesis · 证伪记分牌</text>
  </g>
  <!-- SignalCase -->
  <g transform="translate(628 236)" filter="url(#soft)">
    <rect class="caseCard" x="0" y="0" width="296" height="132" rx="4"/>
    <text class="layer" x="20" y="28">L3 信号</text>
    <text class="caseTitle" x="20" y="56">SignalCase</text>
    <text class="ask" x="20" y="80">现在有可交易的设置吗？</text>
    <text class="small" x="20" y="104">技术因子 0.6 + 新闻情感 0.4 · regime 过滤</text>
    <text class="small" x="20" y="121">量化 audit-only（默认关闭，待门控）</text>
  </g>
  <!-- PositionCase -->
  <g transform="translate(628 412)" filter="url(#soft)">
    <rect class="caseCard" x="0" y="0" width="296" height="132" rx="4"/>
    <text class="layer" x="20" y="28">L3 持仓</text>
    <text class="caseTitle" x="20" y="56">PositionCase</text>
    <text class="ask" x="20" y="80">为何持有，何时退出？</text>
    <text class="small" x="20" y="104">建仓 · 仓位 · ATR 2.5 移动止损 · 退出条件</text>
    <text class="small" x="20" y="121">组合暴露纪律 · 不自动下单</text>
  </g>
  <!-- ReviewCase -->
  <g transform="translate(300 412)" filter="url(#soft)">
    <rect class="caseCard" x="0" y="0" width="296" height="132" rx="4"/>
    <text class="layer" x="20" y="28">L4 复盘 · 校准</text>
    <text class="caseTitle" x="20" y="56">ReviewCase</text>
    <text class="ask" x="20" y="80">结果教会了什么？</text>
    <text class="small" x="20" y="104">归因 · 校准 · 证伪命中 / 错过记分</text>
    <text class="small" x="20" y="121">outcome-gated → 记忆促进候选</text>
  </g>

  <!-- flow arrows between cases -->
  <path class="trace" d="M596 302 H624"/>
  <text class="layer" x="600" y="296">→</text>
  <path class="trace" d="M776 368 V408"/>
  <path class="trace" d="M624 478 H600"/>
  <path class="feedback" d="M448 368 V408"/>

  <!-- inputs to ResearchCase -->
  <path class="trace" d="M268 265 H300"/>
  <path class="trace" d="M268 469 C285 469 290 320 300 304"/>

  <!-- MEMORY band L0 -->
  <text class="column" x="76" y="612">03 / 记忆 · L0 KNOWLEDGE BASE</text>
  <line class="hair" x1="76" y1="624" x2="924" y2="624"/>
  <g transform="translate(76 640)">
    <rect class="memCard" x="0" y="0" width="848" height="66" rx="3"/>
    <g transform="translate(24 18)">
      <rect class="iconWarm" x="1" y="1" width="26" height="30" rx="3"/>
      <path class="iconWarm" d="M7 10 H21 M7 17 H21 M7 24 H16"/>
    </g>
    <text class="label" x="64" y="29">记忆 / 知识库</text>
    <text class="small" x="64" y="49">用户规则 · 复盘教训 · 研究记忆索引 · 风险笔记</text>
    <line x1="430" y1="14" x2="430" y2="52" stroke="#e7c873" stroke-width="1"/>
    <text class="layerWarm" x="456" y="27">OUTCOME-GATED 促进</text>
    <text class="small" x="456" y="49">LLM 产出默认 pending；要结果 + 人工确认才进可信层</text>
  </g>

  <!-- feedback loop ReviewCase -> Memory -> back -->
  <path class="feedback" d="M448 544 V640"/>
  <path class="feedback" d="M76 673 C40 673 40 250 296 250" />
  <text class="layerWarm" x="86" y="690">更有证据的下一次判断 ↺</text>

  <!-- footer: human decision + safety -->
  <g transform="translate(56 766)">
    <rect class="node" x="0" y="-20" width="300" height="42" rx="2"/>
    <g transform="translate(18 -10)">
      <circle class="iconStroke" cx="9" cy="7" r="5"/>
      <path class="iconStroke" d="M1 24 C2 16 16 16 17 24"/>
    </g>
    <text class="small" x="44" y="5">最终决策始终是你 · 系统不自动下单</text>
    <rect class="dashed" x="330" y="-20" width="250" height="42" rx="2"/>
    <text class="layerWarm" x="350" y="-2">SAFETY</text>
    <text class="small" x="350" y="14">key · 写白名单 · 本地优先</text>
    <text class="small" x="612" y="3">闭环架构已落地，默认休眠，过门后逐步激活。</text>
  </g>
</svg>
