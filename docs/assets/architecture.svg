<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
  <title id="title">MingCang clean evidence architecture</title>
  <desc id="desc">Clean white component-style architecture diagram for MingCang with inputs, local evidence core, SQLite and memory, agent surfaces, human decision outputs, and safety gates.</desc>
  <defs>
    <linearGradient id="coreFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="0.58" stop-color="#f8fffd"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="warmFill" x1="0" x2="1">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f766e" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1 1 L7 4.5 L1 8 Z" fill="#0f766e" opacity="0.45"/>
    </marker>
    <marker id="arrowWarm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1 1 L7 4.5 L1 8 Z" fill="#b7791f" opacity="0.60"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1.2; }
      .sectionLine { stroke: #e5e7eb; stroke-width: 1; }
      .hair { stroke: #0d1117; stroke-opacity: 0.08; stroke-width: 1; }
      .trace { fill: none; stroke: #0f766e; stroke-opacity: 0.36; stroke-width: 1.55; stroke-linecap: round; marker-end: url(#arrow); }
      .traceWarm { fill: none; stroke: #b7791f; stroke-opacity: 0.46; stroke-width: 1.35; stroke-linecap: round; stroke-dasharray: 7 8; marker-end: url(#arrowWarm); }
      .kicker { font: 650 10.5px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #0f766e; letter-spacing: 0.16em; }
      .title { font: 760 38px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0d1117; letter-spacing: 0; }
      .subtitle { font: 430 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6b68; letter-spacing: 0; }
      .column { font: 700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #72807c; letter-spacing: 0.14em; }
      .label { font: 730 16px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0d1117; letter-spacing: 0; }
      .small { font: 430 12px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6b68; letter-spacing: 0; }
      .micro { font: 650 10.5px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #0f766e; letter-spacing: 0.11em; }
      .microWarm { font: 650 10.5px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #9a6700; letter-spacing: 0.11em; }
      .node { fill: #ffffff; stroke: #d9e2df; stroke-width: 1.05; }
      .nodeTeal { fill: #f0fdfa; stroke: #99d8cf; stroke-width: 1.05; }
      .nodeWarm { fill: url(#warmFill); stroke: #e7c873; stroke-width: 1.05; }
      .nodeDashed { fill: #fffdf8; stroke: #c28c2a; stroke-width: 1.1; stroke-dasharray: 7 7; }
      .iconStroke { fill: none; stroke: #3f4a47; stroke-width: 1.35; stroke-linecap: round; stroke-linejoin: round; }
      .iconTeal { fill: none; stroke: #0f766e; stroke-width: 1.35; stroke-linecap: round; stroke-linejoin: round; }
      .iconWarm { fill: none; stroke: #9a6700; stroke-width: 1.35; stroke-linecap: round; stroke-linejoin: round; }
      .corePanel { fill: url(#coreFill); stroke: #9fd8d1; stroke-width: 1.2; }
      .coreTitle { font: 780 29px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0d1117; letter-spacing: 0; }
      .coreSub { font: 650 10.5px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #0f766e; letter-spacing: 0.14em; }
    </style>
  </defs>

  <rect class="bg" width="1000" height="1000"/>

  <text class="kicker" x="56" y="66">MINGCANG / LOCAL-FIRST RESEARCH OS</text>
  <text class="title" x="56" y="112">Clean Evidence Architecture</text>
  <text class="subtitle" x="58" y="143">Component-style map of local data, memory, agent context, and gated human decisions.</text>

  <rect class="frame" x="48" y="176" width="904" height="644" rx="2"/>
  <line class="sectionLine" x1="310" y1="176" x2="310" y2="820"/>
  <line class="sectionLine" x1="682" y1="176" x2="682" y2="820"/>
  <line class="hair" x1="76" y1="224" x2="924" y2="224"/>

  <text class="column" x="76" y="208">01 / INPUTS</text>
  <text class="column" x="340" y="208">02 / LOCAL EVIDENCE CORE</text>
  <text class="column" x="712" y="208">03 / SURFACES</text>

  <path class="trace" d="M296 306 H360"/>
  <path class="trace" d="M296 438 H360"/>
  <path class="trace" d="M296 570 H360"/>
  <path class="trace" d="M612 356 H712"/>
  <path class="trace" d="M612 488 H712"/>
  <path class="traceWarm" d="M505 518 V724 H712"/>
  <path class="traceWarm" d="M505 518 V724 H296"/>

  <g transform="translate(76 274)">
    <rect class="node" x="0" y="0" width="220" height="64" rx="2"/>
    <g transform="translate(18 16)">
      <ellipse class="iconStroke" cx="12" cy="7" rx="12" ry="6"/>
      <path class="iconStroke" d="M0 7 V25 C0 28 5 32 12 32 C19 32 24 28 24 25 V7"/>
      <path class="iconStroke" d="M0 16 C0 19 5 23 12 23 C19 23 24 19 24 16"/>
    </g>
    <text class="label" x="58" y="27">Market Data</text>
    <text class="small" x="58" y="49">prices, financials, QFII</text>
  </g>

  <g transform="translate(76 406)">
    <rect class="node" x="0" y="0" width="220" height="64" rx="2"/>
    <g transform="translate(18 16)">
      <rect class="iconStroke" x="0" y="0" width="26" height="30" rx="3"/>
      <path class="iconStroke" d="M0 8 H26 M7 18 H20 M7 24 H17"/>
      <circle cx="6" cy="4" r="1.2" fill="#3f4a47"/>
    </g>
    <text class="label" x="58" y="27">News Context</text>
    <text class="small" x="58" y="49">events and sentiment</text>
  </g>

  <g transform="translate(76 538)">
    <rect class="node" x="0" y="0" width="220" height="64" rx="2"/>
    <g transform="translate(16 18)">
      <rect class="iconStroke" x="3" y="0" width="25" height="20" rx="2"/>
      <path class="iconStroke" d="M0 28 H31 L27 20 H4 Z"/>
      <circle cx="15.5" cy="10" r="4" fill="none" stroke="#3f4a47" stroke-width="1.2"/>
    </g>
    <text class="label" x="58" y="27">User State</text>
    <text class="small" x="58" y="49">watchlist and holdings</text>
  </g>

  <g transform="translate(76 692)">
    <rect class="nodeDashed" x="0" y="0" width="220" height="58" rx="2"/>
    <g transform="translate(18 15)">
      <path class="iconWarm" d="M13 0 L25 6 V16 C25 24 19 29 13 32 C7 29 1 24 1 16 V6 Z"/>
      <path class="iconWarm" d="M8 16 L12 20 L19 11"/>
    </g>
    <text class="label" x="58" y="25">Provider Guard</text>
    <text class="small" x="58" y="46">freshness checks</text>
  </g>

  <g transform="translate(360 286)" filter="url(#soft)">
    <rect class="corePanel" x="0" y="0" width="252" height="326" rx="4"/>
    <g transform="translate(30 34)">
      <rect class="iconTeal" x="0" y="0" width="36" height="28" rx="4"/>
      <path class="iconTeal" d="M8 9 H28 M8 17 H20"/>
    </g>
    <text class="coreTitle" x="78" y="58">MingCang</text>
    <text class="coreSub" x="78" y="85">EVIDENCE CORE</text>
    <line class="hair" x1="30" y1="118" x2="222" y2="118"/>
    <text class="micro" x="30" y="150">SIGNALS</text>
    <text class="small" x="112" y="150">technical + sentiment</text>
    <text class="micro" x="30" y="194">DOSSIER</text>
    <text class="small" x="112" y="194">context and thesis</text>
    <text class="micro" x="30" y="238">RISK</text>
    <text class="small" x="112" y="238">ATR and exposure</text>
    <text class="micro" x="30" y="282">REVIEW</text>
    <text class="small" x="112" y="282">outcome memory</text>
  </g>

  <g transform="translate(360 692)">
    <rect class="nodeTeal" x="0" y="0" width="116" height="58" rx="2"/>
    <g transform="translate(16 14)">
      <ellipse class="iconTeal" cx="11" cy="6" rx="11" ry="5"/>
      <path class="iconTeal" d="M0 6 V25 C0 28 5 31 11 31 C17 31 22 28 22 25 V6"/>
    </g>
    <text class="micro" x="48" y="24">SQLITE</text>
    <text class="small" x="48" y="45">local DB</text>
  </g>

  <g transform="translate(496 692)">
    <rect class="nodeTeal" x="0" y="0" width="116" height="58" rx="2"/>
    <g transform="translate(16 14)">
      <rect class="iconTeal" x="1" y="1" width="24" height="28" rx="3"/>
      <path class="iconTeal" d="M7 9 H19 M7 16 H19 M7 23 H15"/>
    </g>
    <text class="micro" x="48" y="24">MEMORY</text>
    <text class="small" x="48" y="45">gated</text>
  </g>

  <g transform="translate(712 274)">
    <rect class="node" x="0" y="0" width="220" height="64" rx="2"/>
    <g transform="translate(18 16)">
      <rect class="iconStroke" x="0" y="0" width="28" height="24" rx="3"/>
      <path class="iconStroke" d="M0 8 H28 M9 15 L5 18 L9 21 M19 15 L23 18 L19 21"/>
    </g>
    <text class="label" x="58" y="27">Agent Tools</text>
    <text class="small" x="58" y="49">CLI, Pi, MCP</text>
  </g>

  <g transform="translate(712 406)">
    <rect class="node" x="0" y="0" width="220" height="64" rx="2"/>
    <g transform="translate(16 16)">
      <rect class="iconStroke" x="0" y="0" width="30" height="24" rx="3"/>
      <path class="iconStroke" d="M5 30 H25 L22 24 H8 Z M7 9 H23 M7 16 H18"/>
    </g>
    <text class="label" x="58" y="27">Research UI</text>
    <text class="small" x="58" y="49">console and exports</text>
  </g>

  <g transform="translate(712 538)">
    <rect class="nodeWarm" x="0" y="0" width="220" height="64" rx="2"/>
    <g transform="translate(18 15)">
      <circle class="iconWarm" cx="13" cy="9" r="6"/>
      <path class="iconWarm" d="M3 31 C5 22 21 22 23 31"/>
    </g>
    <text class="label" x="58" y="27">Human Decision</text>
    <text class="small" x="58" y="49">no auto orders</text>
  </g>

  <g transform="translate(712 692)">
    <rect class="nodeDashed" x="0" y="0" width="220" height="58" rx="2"/>
    <g transform="translate(18 14)">
      <path class="iconWarm" d="M13 1 L25 7 V16 C25 24 19 29 13 32 C7 29 1 24 1 16 V7 Z"/>
      <path class="iconWarm" d="M8 16 L12 20 L19 11"/>
    </g>
    <text class="microWarm" x="58" y="24">SAFETY</text>
    <text class="small" x="58" y="45">key + allowlist</text>
  </g>

  <g transform="translate(56 900)">
    <rect class="node" x="0" y="-22" width="196" height="46" rx="2"/>
    <line x1="18" y1="1" x2="74" y2="1" stroke="#0f766e" stroke-opacity="0.50" stroke-width="1.5"/>
    <text class="small" x="92" y="5">read/context</text>
    <rect class="nodeWarm" x="270" y="-22" width="300" height="46" rx="2"/>
    <line x1="288" y1="1" x2="344" y2="1" stroke="#b7791f" stroke-opacity="0.62" stroke-width="1.5" stroke-dasharray="7 8"/>
    <text class="small" x="362" y="5">gated write / promotion</text>
    <text class="small" x="644" y="5">Quant audit-only; HK/US read-only.</text>
  </g>
</svg>
