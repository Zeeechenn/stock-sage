version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite-stack:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "actions/upload-pages-artifact"
        update-types:
          - "version-update:semver-major"
        versions:
          - "v5"
          - "5.x"
      - dependency-name: "actions/deploy-pages"
        update-types:
          - "version-update:semver-major"
        versions:
          - "v5"
          - "5.x"
